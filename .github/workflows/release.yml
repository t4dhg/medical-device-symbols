name: Release

# Publishes to npm with provenance when a version tag (e.g. v2.2.0) is pushed.
# Requires a repository secret named NPM_TOKEN (an npm automation or granular
# publish token). Provenance is generated automatically from this workflow via
# the id-token permission below.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
