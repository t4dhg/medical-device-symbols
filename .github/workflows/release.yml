name: Release

# Publishes to npm with provenance when a version tag (e.g. v2.2.0) is pushed.
#
# Uses npm Trusted Publishing (OIDC): no token or secret is stored. Configure it
# once on npmjs.com for this package under Settings > Trusted Publisher:
#   Publisher:  GitHub Actions
#   Repository: t4dhg/medical-device-symbols
#   Workflow:   release.yml
#   Environment: (leave blank)

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # Trusted Publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
